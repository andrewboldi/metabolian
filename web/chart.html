<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Chart — Metabolian</title>
  <meta name="description" content="An interactive recreation of the Roche Biochemical Pathways chart: real molecular structures, orthogonal reaction routing, semantic zoom, and clickable enzymes with 3D structures." />
  <meta name="color-scheme" content="dark light" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cpath d='M16 2 27.7 9v14L16 30 4.3 23V9z' fill='none' stroke='%2300e0c6' stroke-width='2'/%3E%3Ccircle cx='16' cy='16' r='3.5' fill='%2300e0c6'/%3E%3C/svg%3E" />
    <!-- The chart's own two faces. fonts.ready gates label placement (see
         chart.ts), so fetching these in parallel with the sheet keeps that
         gate from adding latency. -->
    <link rel="preload" as="font" type="font/woff2" crossorigin
          href="/metabolian/fonts/inter-latin-400-normal.woff2">
    <link rel="preload" as="font" type="font/woff2" crossorigin
          href="/metabolian/fonts/jetbrains-mono-latin-400-normal.woff2">
  </head>
<body>
  <div id="app-header"></div>
  <main class="chart-shell">
    <div id="chart-canvas"></div>

    <div class="chart-hud">
      <strong id="chart-title" style="font-family:var(--font-display);font-size:var(--step-0)">Loading…</strong>
      <select id="chart-picker" class="search" style="width:auto;padding:.3rem .5rem" aria-label="Choose pathway"></select>
      <button class="icon-btn" id="zoom-out" aria-label="Zoom out" title="Zoom out">−</button>
      <span class="zoom-readout" id="zoom-readout">100%</span>
      <button class="icon-btn" id="zoom-in" aria-label="Zoom in" title="Zoom in">+</button>
      <button class="btn btn--ghost" id="zoom-fit" style="padding:.35rem .6rem">Fit</button>
      <span class="lod-badge" id="lod-badge">overview</span>
    </div>

    <p class="chart-help">Drag to pan · scroll to zoom · zoom in for structures, cofactors and EC numbers · click a metabolite to trace it · click a blue enzyme name for its 3D structure</p>

    <aside class="inspector" id="inspector" data-open="false" aria-label="Detail">
      <button class="icon-btn inspector__close" id="inspector-close" aria-label="Close">✕</button>
      <div class="inspector__inner" id="inspector-body"></div>
    </aside>
  </main>
  <script type="module" src="/src/pages/chart.ts"></script>
</body>
</html>
