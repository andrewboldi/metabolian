<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign in — Metabolian</title>
  <meta name="description" content="Sign in to save pathway views and bookmarks in the Metabolian atlas." />
  <meta name="color-scheme" content="dark light" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cpath d='M16 2 27.7 9v14L16 30 4.3 23V9z' fill='none' stroke='%236D98EB' stroke-width='2'/%3E%3Ccircle cx='16' cy='16' r='3.5' fill='%236D98EB'/%3E%3C/svg%3E" />
  <style>
    /* The spec strip under the auth card.
       login.ts owns everything inside #auth-root and page.css owns .auth-card
       (including its "AUTH · v0.1" ::after readout), so this is the one piece
       of the page that can only come from the markup. It answers the question
       the visitor actually has — where does this go? — as instrument readout
       rather than reassurance, which is the whole credibility argument here. */
    .plate-spec {
      margin: var(--sp-4) 0 0;
      padding-inline: var(--sp-6);
      font-family: var(--font-mono);
      font-size: var(--step--2, 0.6875rem);
      font-variant-numeric: tabular-nums lining-nums;
    }
    .plate-spec > div {
      display: flex; align-items: baseline; justify-content: space-between;
      gap: var(--sp-4); padding-block: 0.5rem;
    }
    .plate-spec > div + div { box-shadow: inset 0 1px 0 var(--line); }
    .plate-spec dt { letter-spacing: 0.16em; text-transform: uppercase; color: var(--text-faint); }
    .plate-spec dd { margin: 0; color: var(--text-dim); letter-spacing: 0.02em; }
  </style>
</head>
<body>
  <a class="skip" href="#main">Skip to content</a>
  <div id="app-header"></div>
  <main id="main">
    <div class="wrap auth-wrap">
      <div id="auth-root"></div>
      <dl class="plate-spec">
        <div><dt>Storage</dt><dd>localStorage</dd></div>
        <div><dt>Transport</dt><dd>none</dd></div>
        <div><dt>Retention</dt><dd>until cleared</dd></div>
      </dl>
    </div>
  </main>
  <div id="app-footer"></div>
  <script type="module" src="/src/pages/login.ts"></script>
</body>
</html>
