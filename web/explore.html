<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Follow a compound — Metabolian</title>
  <meta name="description" content="Search any metabolite and see every reaction that makes it and every reaction that uses it, across all pathways at once — then jump to the matching chart sheet." />
  <meta name="color-scheme" content="dark light" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cpath d='M16 2 27.7 9v14L16 30 4.3 23V9z' fill='none' stroke='%2300e0c6' stroke-width='2'/%3E%3Ccircle cx='16' cy='16' r='3.5' fill='%2300e0c6'/%3E%3C/svg%3E" />
</head>
<body>
  <div id="app-header"></div>

  <main class="ex" id="ex-main">
    <!-- Search band: always present, at the top of both the landing and the compound view. -->
    <section class="ex-search" aria-label="Find a compound">
      <div class="wrap">
        <form class="ex-search__form" id="ex-form" role="search" autocomplete="off">
          <label class="ex-search__label" for="ex-q">Find a compound</label>
          <div class="ex-search__field">
            <input
              id="ex-q"
              class="ex-search__input"
              type="text"
              name="q"
              placeholder="Try pyruvate, acetyl-CoA, ATP…"
              role="combobox"
              aria-expanded="false"
              aria-controls="ex-results"
              aria-autocomplete="list"
              aria-describedby="ex-q-help"
              spellcheck="false"
            />
            <button class="ex-search__clear" id="ex-clear" type="button" aria-label="Clear search" hidden>✕</button>
          </div>
          <p class="ex-search__help muted" id="ex-q-help">Every reaction in the atlas that makes or uses a compound, across all pathways.</p>
          <ul class="ex-results" id="ex-results" role="listbox" aria-label="Matching compounds" hidden></ul>
        </form>
      </div>
    </section>

    <!-- Rendered view: landing on load, compound ledger after a selection. Never the whole graph. -->
    <div id="ex-view" class="ex-view"></div>
  </main>

  <p class="visually-hidden" id="ex-live" role="status" aria-live="polite"></p>

  <div id="app-footer"></div>
  <script type="module" src="/src/pages/explore.ts"></script>
</body>
</html>
