<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Glossary — Metabolian</title>
  <meta name="description" content="Search every metabolite and enzyme in the Metabolian atlas — formulae, EC numbers, genes, and links to source databases." />
  <meta name="color-scheme" content="dark light" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cpath d='M16 2 27.7 9v14L16 30 4.3 23V9z' fill='none' stroke='%2300e0c6' stroke-width='2'/%3E%3Ccircle cx='16' cy='16' r='3.5' fill='%2300e0c6'/%3E%3C/svg%3E" />
</head>
<body>
  <div id="app-header"></div>
  <main id="main">
    <header class="page-head">
      <div class="wrap">
        <p class="eyebrow">Reference</p>
        <h1>Glossary</h1>
        <p class="lead">Every metabolite and enzyme in the atlas, searchable, with formulae, codes, and links to the databases each entry is grounded in.</p>
      </div>
    </header>
    <div class="wrap">
      <div class="glossary-controls">
        <input class="search" id="glossary-search" type="search" placeholder="Search terms, genes, descriptions…" aria-label="Search glossary" />
        <div class="filter-pills" role="group" aria-label="Filter by kind">
          <button class="pill" data-kind="all" aria-pressed="true">All</button>
          <button class="pill" data-kind="metabolite" aria-pressed="false">Metabolites</button>
          <button class="pill" data-kind="enzyme" aria-pressed="false">Enzymes</button>
        </div>
        <span class="count-note" id="glossary-count"></span>
      </div>
      <div class="glossary-list" id="glossary-list"></div>
    </div>
  </main>
  <div id="app-footer"></div>
  <script type="module" src="/src/pages/glossary.ts"></script>
</body>
</html>
